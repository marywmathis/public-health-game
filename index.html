<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in Charge — Public Health Decisions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --bg-alt: #1a1925;
    --surface: #232234;
    --surface-2: #2d2c42;
    --ink: #fffffe;
    --ink-dim: #a7a9be;
    --ink-dimmer: #6f718a;

    --r1: #00ebc7;
    --r1-dark: #00a78a;
    --r2: #ff8906;
    --r2-dark: #c66400;
    --r3: #f25f4c;
    --r3-dark: #b03d2d;
    --r4: #e53170;
    --r4-dark: #a51e54;

    --correct: #00ebc7;
    --wrong: #ff5470;

    --accent: #ffd803;
    --accent-dark: #b39600;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse 800px 600px at 10% 0%, rgba(229, 49, 112, 0.12), transparent),
      radial-gradient(ellipse 700px 500px at 90% 100%, rgba(0, 235, 199, 0.10), transparent),
      var(--bg);
    min-height: 100vh;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    position: relative;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 2px dashed rgba(255,255,255,0.1);
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-mark {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--bg);
    font-weight: 800; font-size: 20px;
    transform: rotate(-3deg);
    box-shadow: 4px 4px 0 var(--r4);
  }

  .brand-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 4px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .stats { display: flex; gap: 10px; align-items: center; }

  .stat-box {
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 14px;
    min-width: 75px;
    text-align: center;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  .stat-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    margin-top: 2px;
    line-height: 1;
  }

  #stat-score .stat-num { color: var(--accent); }

  .vote-toggle {
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
    font-weight: 700;
  }

  .vote-toggle:hover { border-color: var(--accent); }

  .vote-toggle.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .round-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1.25rem;
  }

  .round-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    color: var(--bg);
    flex-shrink: 0;
  }

  .round-info-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .round-info-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 4px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .progress-row { display: flex; gap: 6px; margin-bottom: 2rem; }

  .progress-dot {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    transition: background 0.3s ease;
  }

  .progress-dot.done { background: var(--accent); }
  .progress-dot.current { background: var(--ink); }

  .stage { min-height: 460px; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .case-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
  }

  .case-pill::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .case-card {
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }

  .case-card::before {
    content: 'CASE FILE';
    position: absolute;
    top: 12px; right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-dimmer);
    opacity: 0.5;
  }

  .case-stripe {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
  }

  .case-setup {
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    padding-left: 6px;
  }

  .case-q {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    line-height: 1.25;
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  /* VOTE PROMPT BANNER */
  .vote-prompt {
    background: linear-gradient(90deg, rgba(255,216,3,0.18), rgba(255,216,3,0.05));
    border: 1.5px solid rgba(255,216,3,0.4);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .vote-prompt-icon {
    font-size: 24px;
  }

  .vote-prompt-text {
    flex: 1;
    min-width: 200px;
  }

  .vote-prompt-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }

  .vote-prompt-sub {
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.4;
  }

  .vote-prompt-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .vote-total-display {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }

  .vote-total-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .vote-reveal-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    transition: all 0.15s ease;
    box-shadow: 0 3px 0 var(--accent-dark);
  }

  .vote-reveal-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 0 var(--accent-dark);
  }

  .vote-reveal-btn:active:not(:disabled) {
    transform: translateY(1px);
    box-shadow: 0 2px 0 var(--accent-dark);
  }

  .vote-reveal-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    box-shadow: none;
  }

  .vote-clear-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: var(--ink-dim);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }

  .vote-clear-btn:hover {
    color: var(--ink);
    border-color: rgba(255,255,255,0.3);
  }

  /* CHOICE WITH VOTE BAR */
  .choice {
    display: flex;
    width: 100%;
    text-align: left;
    padding: 16px 18px;
    margin-bottom: 12px;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    font-size: 14.5px;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.55;
    gap: 14px;
    align-items: center;
    position: relative;
    overflow: hidden;
    min-height: 64px;
  }

  .choice:hover:not(.locked) {
    background: var(--surface-2);
    border-color: rgba(255,255,255,0.2);
  }

  .choice.leading {
    border-color: rgba(255,216,3,0.5);
    background: linear-gradient(90deg, rgba(255,216,3,0.06), var(--surface));
  }

  /* Vote fill bar — colored stripe that grows from left */
  .vote-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(255,216,3,0.22), rgba(255,216,3,0.08));
    transition: width 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    width: 0%;
    z-index: 0;
  }

  .choice.leading .vote-fill {
    background: linear-gradient(90deg, rgba(255,216,3,0.32), rgba(255,216,3,0.12));
  }

  .choice-letter {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.18s ease;
    position: relative;
    z-index: 2;
  }

  .choice:hover:not(.locked) .choice-letter {
    background: var(--accent);
    color: var(--bg);
  }

  .choice.leading .choice-letter {
    background: var(--accent);
    color: var(--bg);
  }

  .choice-text {
    flex: 1;
    position: relative;
    z-index: 2;
  }

  /* Big percentage display on right */
  .vote-display {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    z-index: 2;
    position: relative;
    flex-shrink: 0;
  }

  .vote-percent {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
    min-width: 70px;
    text-align: right;
    letter-spacing: -0.02em;
  }

  .vote-percent.zero {
    color: var(--ink-dimmer);
  }

  .vote-percent-symbol {
    font-size: 18px;
    opacity: 0.7;
  }

  .vote-count-small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .vote-buttons {
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 2;
    position: relative;
  }

  .vote-btn {
    width: 32px; height: 28px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.3);
    color: var(--ink);
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
    line-height: 1;
    padding: 0;
  }

  .vote-btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .vote-btn:active { transform: scale(0.9); }

  /* When answered */
  .choice.correct {
    background: linear-gradient(90deg, rgba(0,235,199,0.18), rgba(0,235,199,0.05));
    border-color: var(--correct);
    animation: correctPop 0.5s ease;
  }

  .choice.correct .choice-letter {
    background: var(--correct);
    color: var(--bg);
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .choice.wrong {
    background: linear-gradient(90deg, rgba(255,84,112,0.18), rgba(255,84,112,0.05));
    border-color: var(--wrong);
    animation: shake 0.4s ease;
  }

  .choice.wrong .choice-letter {
    background: var(--wrong);
    color: var(--bg);
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(8px); }
  }

  .check-mark {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    z-index: 2;
    position: relative;
    margin-left: auto;
    flex-shrink: 0;
  }

  .check-mark.right { color: var(--correct); }
  .check-mark.wrong { color: var(--wrong); }

  .choice.locked { cursor: default; }
  .choice.locked:not(.correct):not(.wrong) { opacity: 0.55; }

  .explain {
    margin-top: 18px;
    padding: 18px 20px;
    background: var(--surface);
    border-radius: 12px;
    border: 1.5px solid rgba(255,216,3,0.25);
    position: relative;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .explain-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--accent);
    color: var(--bg);
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .explain-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-dim);
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    gap: 12px;
  }

  .nav-btn {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .nav-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.3);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    text-align: center;
    flex: 1;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .welcome { text-align: center; padding: 1rem 1rem 2rem; }

  .welcome-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .welcome-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  .welcome-title .accent {
    color: var(--accent);
    display: inline-block;
    transform: rotate(-2deg);
  }

  .welcome-body {
    font-size: 16px;
    color: var(--ink-dim);
    line-height: 1.7;
    max-width: 560px;
    margin: 0 auto 2.5rem;
  }

  .vote-instructions {
    background: var(--surface);
    border: 1.5px dashed rgba(255,216,3,0.4);
    border-radius: 12px;
    padding: 18px 22px;
    max-width: 600px;
    margin: 0 auto 2rem;
    text-align: left;
    font-size: 13.5px;
    color: var(--ink-dim);
    line-height: 1.7;
  }

  .vote-instructions strong {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
  }

  .round-preview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    max-width: 700px;
    margin: 0 auto 2.5rem;
    text-align: left;
  }

  .round-card {
    padding: 18px;
    border-radius: 14px;
    background: var(--surface);
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease;
  }

  .round-card:hover { transform: translateY(-3px); }

  .round-card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .round-card-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    line-height: 1.2;
  }

  .cta-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 16px 36px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 0 var(--accent-dark);
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 var(--accent-dark);
  }

  .cta-btn:active {
    transform: translateY(2px);
    box-shadow: 0 0 0 var(--accent-dark);
  }

  .end-score-display {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(80px, 14vw, 140px);
    line-height: 1;
    letter-spacing: -0.05em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--r3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .end-score-out-of {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .end-blurb {
    font-size: 18px;
    color: var(--ink);
    line-height: 1.6;
    max-width: 500px;
    margin: 0 auto 2rem;
    font-weight: 500;
  }

  .exit-ticket {
    background: var(--surface);
    border: 2px dashed rgba(255,216,3,0.4);
    padding: 22px 24px;
    border-radius: 14px;
    text-align: left;
    max-width: 580px;
    margin: 0 auto 2rem;
  }

  .exit-ticket-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .exit-ticket-body {
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--ink-dim);
  }

  .site-footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px dashed rgba(255,255,255,0.08);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dimmer);
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 700px) {
    .container { padding: 1.25rem 1rem 3rem; }
    .case-q { font-size: 18px; }
    .case-setup { font-size: 14px; }
    .choice { padding: 14px 12px; font-size: 14px; gap: 10px; }
    .top-bar { flex-wrap: wrap; gap: 16px; }
    .stat-box { padding: 6px 10px; min-width: 65px; }
    .stat-num { font-size: 18px; }
    .case-card { padding: 18px 20px; }
    .vote-percent { font-size: 24px; min-width: 50px; }
    .vote-percent-symbol { font-size: 14px; }
    .choice-letter { width: 30px; height: 30px; font-size: 14px; }
    .vote-btn { width: 28px; height: 24px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="container">

  <header class="top-bar">
    <div class="brand">
      <div class="brand-mark">+</div>
      <div>
        <div class="brand-title">YOU'RE IN CHARGE</div>
        <div class="brand-sub">Public Health · Decision Lab</div>
      </div>
    </div>
    <div class="stats">
      <button class="vote-toggle" id="vote-toggle" title="Toggle voting mode">
        🗳 Vote: Off
      </button>
      <div class="stat-box" id="stat-case">
        <div class="stat-label">Case</div>
        <div class="stat-num" id="qnum">—</div>
      </div>
      <div class="stat-box" id="stat-score">
        <div class="stat-label">Score</div>
        <div class="stat-num" id="score">0</div>
      </div>
    </div>
  </header>

  <div class="round-banner" id="round-banner" style="display:none;">
    <div class="round-icon" id="round-icon">1</div>
    <div>
      <div class="round-info-title" id="round-title">Round 1</div>
      <div class="round-info-sub" id="round-sub">Health literacy</div>
    </div>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <main class="stage" id="stage"></main>

  <div class="controls">
    <button class="nav-btn" id="back-btn">← Back</button>
    <div class="status-text" id="status"></div>
    <button class="nav-btn" id="next-btn">Next →</button>
  </div>

  <footer class="site-footer">
    A teaching tool · Built for classroom discussion
  </footer>

</div>

<script>
(function() {
  const ROUND_STYLES = {
    1: { color: 'var(--r1)', dark: 'var(--r1-dark)', name: 'Health Literacy', sub: 'Evaluating claims' },
    2: { color: 'var(--r2)', dark: 'var(--r2-dark)', name: 'Outbreak Response', sub: 'When the alarm rings' },
    3: { color: 'var(--r3)', dark: 'var(--r3-dark)', name: 'Equity & Access', sub: 'Where resources go' },
    4: { color: 'var(--r4)', dark: 'var(--r4-dark)', name: "You're in Charge", sub: 'Mixed scenarios' }
  };

  const scenarios = [
    {
      roundNum: 1,
      setup: "A wellness influencer with 2M followers claims a $40 supplement 'cleanses toxins' and prevents cancer. A parent at your clinic asks if their kid should take it. You have 5 minutes.",
      q: "Best response?",
      choices: [
        "Tell them flatly it's a scam and move on — there's no evidence",
        "Recommend they try it if it gives peace of mind — placebo can help",
        "Ask what they're worried about, share what the actual evidence shows, and explain how to evaluate health claims (who funded the study, peer review, etc.)",
        "Refer them to a specialist for further evaluation"
      ],
      correct: 2,
      explain: "Health literacy isn't 'tell people what to think' — it's teaching the skill of evaluating information. Dismissing them (A) damages trust. Endorsing it (B) is unethical. Referring (D) wastes resources on a non-medical problem. The middle path respects the parent AND builds a skill they'll use the next 100 times this comes up."
    },
    {
      roundNum: 1,
      setup: "A new study (one study, small sample) finds people who drink 4 cups of coffee daily have 12% lower rates of a specific cancer. Headlines scream COFFEE CURES CANCER. Your school newspaper asks for a quote.",
      q: "What do you tell them?",
      choices: [
        "Coffee is now recommended for cancer prevention",
        "One small study isn't enough — we need replication, larger samples, and to rule out other explanations like the kind of people who drink coffee being different to begin with",
        "Avoid coffee until more research is done",
        "Studies are unreliable in general — trust your gut"
      ],
      correct: 1,
      explain: "'Correlation isn't causation' is the cliche, but the real public health skill is asking: was this replicated? How big was the sample? What confounders weren't measured? Coffee drinkers might exercise more, sleep less, be wealthier. One study is a hypothesis, not a conclusion. (D) throws out science entirely, which is its own trap."
    },
    {
      roundNum: 2,
      setup: "Day 1 of an outbreak: 14 students at your school have flu-like symptoms in 3 days. Parents are calling. The local news wants a statement. Superintendent wants the school closed by tomorrow. You're the public health officer.",
      q: "First move?",
      choices: [
        "Close the school — better safe than sorry",
        "Wait 48 hours to see if more cases develop before acting",
        "Interview the sick students about shared exposures (food, classes, sports) and start tracking new cases by day",
        "Mass test every student in the building"
      ],
      correct: 2,
      explain: "Closing without data (A) wastes huge political capital and might be wrong — what if it's all from one cafeteria? Waiting (B) loses critical hours. Mass testing (D) is expensive and doesn't tell you WHY. Case-finding first: who's sick, what do they share. Closure may follow — but evidence-based, not panic-based."
    },
    {
      roundNum: 2,
      setup: "Day 5: Investigation reveals the outbreak is norovirus from contaminated cafeteria food. 40 students now sick, none seriously. Cafeteria already cleaned. A reporter asks whether you'll publicly name the food vendor.",
      q: "What do you do?",
      choices: [
        "Name the vendor immediately — the public has a right to know",
        "Don't name them — that's defamation if you're wrong",
        "Confirm the source with lab evidence first, notify the vendor privately to allow correction, then disclose publicly with context once confirmed",
        "Refer the question to the school's lawyers and decline to comment"
      ],
      correct: 2,
      explain: "Naming too early (A) can be wrong and irreversibly harms a business. Hiding (B, D) erodes trust. Public health communication is about transparency WITH accuracy. Confirm the source, give the named party a chance to respond, then disclose. This is the same principle used in food safety recalls — the FDA doesn't just blast names without confirmation."
    },
    {
      roundNum: 3,
      setup: "Your city has high childhood asthma rates concentrated in 2 neighborhoods. Both have older housing, more traffic, and fewer trees. Budget allows ONE intervention.",
      q: "Where do you put the money?",
      choices: [
        "Free inhalers and asthma medication for every kid in those zip codes",
        "A new community health clinic in the affected area",
        "Inspect and remediate housing (mold, pests, ventilation) plus traffic-reduction measures near schools",
        "Asthma education and self-management classes for families"
      ],
      correct: 2,
      explain: "(A) and (B) treat asthma after it's triggered — important but reactive. (D) puts the burden on families to manage a problem caused by their environment. The upstream move addresses WHY asthma is concentrated here. Caveat: in real life you'd want all four eventually. But forced to pick one, the structural fix prevents the most cases, including in kids not yet born."
    },
    {
      roundNum: 3,
      setup: "Two communities need flu vaccine outreach. Community A: middle-class, 60% already vaccinated, easy to reach. Community B: lower-income, 30% vaccinated, harder to reach, historically distrusts the health system. You can fund outreach in only one this year.",
      q: "Where do you focus?",
      choices: [
        "Community A — you'll get higher vaccination numbers, which looks better in reports",
        "Community B — the gap is bigger and the need is greater, even though it's harder",
        "Split funding 50/50 to be fair",
        "Skip both and run a generic citywide campaign"
      ],
      correct: 1,
      explain: "This is the equity-vs-equality distinction. (C) sounds fair but underfunds the place that needs more. (A) optimizes for metrics, not health. (D) is the 'we treated everyone the same' move that consistently widens gaps. Real equity work means putting resources where need is highest — even when it's harder and produces less impressive headline numbers."
    },
    {
      roundNum: 4,
      setup: "A school survey shows 30% of students report persistent sadness. Anxiety referrals are up. The board offers one funded option for next year.",
      q: "Which do you push for?",
      choices: [
        "Hire a second guidance counselor to handle individual crisis cases",
        "Universal social-emotional curriculum + screening to identify struggling students + clear referral pathway to existing community therapists",
        "Mandatory mindfulness app subscriptions for all students",
        "Increase suspension for behavioral issues to maintain order"
      ],
      correct: 1,
      explain: "(A) only catches kids already in crisis — too late for many. (C) is the trendy answer but evidence on app-only interventions is thin, especially without human follow-up. (D) is what schools historically did, and it harms the kids most likely to be struggling. Tiered support (universal + screening + referral) is what evidence backs. Worth discussing: screening only works if there's somewhere to refer kids TO."
    },
    {
      roundNum: 4,
      setup: "Your county hits 100°F+ days 30 times each summer now, up from 8 a decade ago. ER visits for heat illness rose 40%, mostly elderly, outdoor workers, and people without AC. Council wants action but the budget is limited.",
      q: "Highest-impact first move?",
      choices: [
        "Citywide PSA campaign telling people to hydrate and stay indoors",
        "Buy and distribute window AC units to every household that requests one",
        "Map heat-vulnerable residents, open cooling centers in their neighborhoods with transit access, and start a buddy-check system for isolated elderly",
        "Mandate that all outdoor workers stop work at 95°F"
      ],
      correct: 2,
      explain: "(A) is cheap but PSAs alone barely move outcomes — and assume people have AC to retreat to. (B) sounds generous but costs are huge, and AC units raise electric bills the poorest can't pay. (D) is the right idea but harder to enforce as a first step. Vulnerability mapping + accessible cooling + welfare checks is the evidence-based combo — but reasonable people could argue (D) belongs in the package too."
    },
    {
      roundNum: 4,
      setup: "Childhood vaccination rates dropped from 95% to 82% in 5 years. Measles is spreading. Most hesitant parents aren't anti-science — they're confused, busy, or distrustful of authorities. Some had bad experiences with the medical system.",
      q: "Pick one funded strategy:",
      choices: [
        "Pass a state mandate eliminating non-medical exemptions, with fines for non-compliance",
        "Fund trusted local messengers — pediatricians, faith leaders, parent ambassadors from the affected communities — to have honest one-on-one conversations and make appointments easy",
        "Launch a graphic ad campaign showing children hospitalized with measles",
        "Require unvaccinated families to attend mandatory education sessions"
      ],
      correct: 1,
      explain: "Mandates (A) work in some contexts but often harden opposition and create political backlash — especially with already-distrustful communities. Fear ads (C) and mandatory education (D) tend to entrench resistance, per multiple studies. Trust gets rebuilt person-by-person. Caveat for discussion: in a severe active outbreak, some mandates (school exclusion of unvaccinated kids) ARE evidence-based — context matters."
    },
    {
      roundNum: 4,
      setup: "A low-income neighborhood is a 'food desert.' No grocery store within 2 miles, 6 fast food spots, 4 corner stores selling mostly processed food. Diabetes rates double the city average. You have one year of funding.",
      q: "Best use of one year:",
      choices: [
        "Subsidize a full-service grocery store to open in the neighborhood",
        "Pay corner stores to stock fresh produce and partner with a local farm for supply, plus add a bus route to existing supermarkets",
        "Run nutrition education classes at the community center",
        "Tax fast food restaurants to push them out of the neighborhood"
      ],
      correct: 1,
      explain: "Tricky one. (A) sounds best — and IS the long-term goal — but grocery stores in food deserts have a HIGH failure rate when imposed top-down without addressing demand and transit. (C) alone fails when there's nothing to buy. (D) often backfires and removes affordable food without replacing it. The corner-store + transit play is faster, cheaper, more sustainable, and respects what residents already use. Open for debate — some experts strongly prefer (A) if the funding can sustain it."
    }
  ];

  let idx = -1;
  let score = 0;
  let answered = {};
  let votes = {};
  let voteMode = false;

  const stage = document.getElementById('stage');
  const scoreEl = document.getElementById('score');
  const qnumEl = document.getElementById('qnum');
  const progEl = document.getElementById('progress-row');
  const statusEl = document.getElementById('status');
  const backBtn = document.getElementById('back-btn');
  const nextBtn = document.getElementById('next-btn');
  const roundBanner = document.getElementById('round-banner');
  const roundIcon = document.getElementById('round-icon');
  const roundTitle = document.getElementById('round-title');
  const roundSub = document.getElementById('round-sub');
  const voteToggleBtn = document.getElementById('vote-toggle');

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function getVotes(qIdx) {
    if (!votes[qIdx]) votes[qIdx] = [0, 0, 0, 0];
    return votes[qIdx];
  }

  function totalVotes(qIdx) {
    return getVotes(qIdx).reduce((a, b) => a + b, 0);
  }

  function topChoice(qIdx) {
    const v = getVotes(qIdx);
    const total = totalVotes(qIdx);
    if (total === 0) return -1;
    let max = -1, maxI = -1;
    for (let i = 0; i < v.length; i++) {
      if (v[i] > max) { max = v[i]; maxI = i; }
    }
    return maxI;
  }

  function buildProgress() {
    progEl.innerHTML = scenarios.map((_, i) => {
      let cls = 'progress-dot';
      if (i < idx) cls += ' done';
      else if (i === idx) cls += ' current';
      return `<div class="${cls}"></div>`;
    }).join('');
  }

  function render() {
    if (idx === -1) renderWelcome();
    else if (idx >= scenarios.length) renderEnd();
    else renderScenario();
    updateChrome();
  }

  function updateChrome() {
    scoreEl.textContent = score;
    if (idx === -1) {
      qnumEl.textContent = "—";
      roundBanner.style.display = 'none';
      progEl.style.display = 'none';
    } else if (idx >= scenarios.length) {
      qnumEl.textContent = `${scenarios.length}/${scenarios.length}`;
      roundBanner.style.display = 'none';
      progEl.style.display = 'flex';
      buildProgress();
    } else {
      qnumEl.textContent = `${idx + 1}/${scenarios.length}`;
      const r = ROUND_STYLES[scenarios[idx].roundNum];
      roundIcon.textContent = scenarios[idx].roundNum;
      roundIcon.style.background = r.color;
      roundIcon.style.boxShadow = `4px 4px 0 ${r.dark}`;
      roundTitle.textContent = r.name;
      roundSub.textContent = r.sub;
      roundBanner.style.display = 'flex';
      progEl.style.display = 'flex';
      buildProgress();
    }
    backBtn.disabled = (idx <= -1);
    nextBtn.disabled = (idx >= scenarios.length);

    if (idx >= 0 && idx < scenarios.length && answered[idx] === undefined) {
      statusEl.textContent = voteMode
        ? "[ Count hands · Tap + on each answer · Reveal when done ]"
        : "[ Discuss · Click your answer ]";
    } else {
      statusEl.textContent = "";
    }

    voteToggleBtn.textContent = voteMode ? '🗳 Vote: On' : '🗳 Vote: Off';
    voteToggleBtn.classList.toggle('active', voteMode);
  }

  function renderWelcome() {
    stage.innerHTML = `
      <div class="welcome">
        <div class="welcome-eyebrow">⚡ Public Health Decision Lab</div>
        <div class="welcome-title">
          You're <span class="accent">in charge.</span><br>
          Now what?
        </div>
        <div class="welcome-body">
          10 real public health dilemmas. Each one has tradeoffs — there's no obvious right answer. Discuss as a class, vote, then see what the evidence actually says.
        </div>
        <div class="vote-instructions">
          <strong>🗳 How class voting works</strong>
          Click "Vote: Off" in the top right to turn voting on. For each case, ask: <em>"How many of you choose A?"</em> Count the raised hands. Tap the <strong style="color:var(--ink); display:inline; font-size:13.5px;">+</strong> button next to A that many times. Repeat for B, C, and D. Big <strong style="color:var(--accent); display:inline; font-size:13.5px;">percentages</strong> on each answer show the class split in real time. When everyone's voted, hit <strong style="color:var(--ink); display:inline; font-size:13.5px;">Reveal Answer</strong> — the class's top pick locks in, and the evidence appears.
        </div>
        <div class="round-preview">
          ${[1,2,3,4].map(n => {
            const r = ROUND_STYLES[n];
            return `<div class="round-card" style="border-top: 4px solid ${r.color};">
              <div class="round-card-num">Round 0${n}</div>
              <div class="round-card-title">${r.name}</div>
            </div>`;
          }).join('')}
        </div>
        <button class="cta-btn" id="start-btn">Start Case 01 →</button>
      </div>
    `;
    document.getElementById('start-btn').addEventListener('click', () => { idx = 0; render(); });
  }

  function renderScenario() {
    const s = scenarios[idx];
    const r = ROUND_STYLES[s.roundNum];
    const ans = answered[idx];
    const v = getVotes(idx);
    const tot = totalVotes(idx);
    const leader = tot > 0 ? topChoice(idx) : -1;

    let choicesHTML = s.choices.map((c, i) => {
      let cls = 'choice';
      const isLocked = ans !== undefined;

      if (isLocked) {
        cls += ' locked';
        if (i === s.correct) cls += ' correct';
        else if (i === ans) cls += ' wrong';
      } else if (voteMode && i === leader && tot > 0) {
        cls += ' leading';
      }

      const pct = tot > 0 ? Math.round((v[i] / tot) * 100) : 0;

      // Vote fill bar
      const voteFillHTML = (voteMode && !isLocked && tot > 0)
        ? `<div class="vote-fill" style="width: ${pct}%;"></div>`
        : '';

      // Right side: vote display OR check mark
      let rightSideHTML = '';
      if (isLocked) {
        if (i === s.correct) rightSideHTML = `<span class="check-mark right">✓</span>`;
        else if (i === ans) rightSideHTML = `<span class="check-mark wrong">✗</span>`;
      } else if (voteMode) {
        const pctClass = v[i] === 0 ? 'zero' : '';
        rightSideHTML = `
          <div class="vote-display">
            <div>
              <div class="vote-percent ${pctClass}">${pct}<span class="vote-percent-symbol">%</span></div>
              <div class="vote-count-small">${v[i]} ${v[i] === 1 ? 'vote' : 'votes'}</div>
            </div>
            <div class="vote-buttons">
              <button class="vote-btn" data-vote-up="${i}" title="Add a vote">+</button>
              <button class="vote-btn" data-vote-down="${i}" title="Remove a vote">−</button>
            </div>
          </div>
        `;
      }

      return `<div class="${cls}" data-choice="${i}">
        ${voteFillHTML}
        <span class="choice-letter">${String.fromCharCode(65+i)}</span>
        <span class="choice-text">${escapeHtml(c)}</span>
        ${rightSideHTML}
      </div>`;
    }).join('');

    // Vote prompt banner at the top
    let votePromptHTML = '';
    if (voteMode && ans === undefined) {
      const leaderLetter = leader >= 0 ? String.fromCharCode(65 + leader) : '—';
      votePromptHTML = `
        <div class="vote-prompt">
          <div class="vote-prompt-icon">🗳</div>
          <div class="vote-prompt-text">
            <div class="vote-prompt-title">Class is voting</div>
            <div class="vote-prompt-sub">Ask the class "Who picks A?" then tap <strong>+</strong> next to each answer to count hands.</div>
          </div>
          <div class="vote-prompt-stats">
            <div style="text-align:center;">
              <div class="vote-total-display">${tot}</div>
              <div class="vote-total-label">Total votes</div>
            </div>
            <div style="text-align:center;">
              <div class="vote-total-display" style="color: var(--accent);">${leaderLetter}</div>
              <div class="vote-total-label">Leading</div>
            </div>
            <button class="vote-clear-btn" id="vote-clear">Reset</button>
            <button class="vote-reveal-btn" id="vote-reveal" ${tot > 0 ? '' : 'disabled'}>
              ${tot > 0 ? 'Reveal Answer →' : 'Need votes'}
            </button>
          </div>
        </div>
      `;
    }

    const explainHTML = ans !== undefined
      ? `<div class="explain">
          <div class="explain-tag">★ Evidence Says</div>
          <div class="explain-body">${escapeHtml(s.explain)}</div>
        </div>`
      : '';

    stage.innerHTML = `
      <div>
        <div class="case-pill" style="background: ${r.color}; color: var(--bg);">
          Case ${String(idx + 1).padStart(2, '0')} · ${escapeHtml(r.name)}
        </div>
        <div class="case-card">
          <div class="case-stripe" style="background: ${r.color};"></div>
          <div class="case-setup">${escapeHtml(s.setup)}</div>
        </div>
        <div class="case-q">${escapeHtml(s.q)}</div>
        ${votePromptHTML}
        ${choicesHTML}
        ${explainHTML}
      </div>
    `;

    // Wire up +/- vote buttons
    stage.querySelectorAll('[data-vote-up]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(btn.dataset.voteUp);
        getVotes(idx)[i]++;
        render();
      });
    });
    stage.querySelectorAll('[data-vote-down]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(btn.dataset.voteDown);
        const v = getVotes(idx);
        if (v[i] > 0) v[i]--;
        render();
      });
    });

    const clearBtn = document.getElementById('vote-clear');
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        votes[idx] = [0, 0, 0, 0];
        render();
      });
    }

    const revealBtn = document.getElementById('vote-reveal');
    if (revealBtn) {
      revealBtn.addEventListener('click', () => {
        const winner = topChoice(idx);
        if (winner >= 0) {
          answered[idx] = winner;
          if (winner === scenarios[idx].correct) score++;
          render();
        }
      });
    }

    // Direct click on choice (when not voting and not yet answered)
    if (!voteMode && ans === undefined) {
      stage.querySelectorAll('.choice').forEach(choice => {
        choice.addEventListener('click', () => {
          const i = parseInt(choice.dataset.choice);
          answered[idx] = i;
          if (i === scenarios[idx].correct) score++;
          render();
        });
      });
    }
  }

  function renderEnd() {
    let blurb;
    if (score >= scenarios.length - 1) blurb = "Strong public health intuition. You're seeing the tradeoffs.";
    else if (score >= scenarios.length - 3) blurb = "Solid run. You got the structural thinking right.";
    else if (score >= scenarios.length / 2) blurb = "Good — and the answers you got 'wrong' are usually defensible too. That's the point.";
    else blurb = "Score doesn't really matter here. These are debates real officials lose sleep over.";

    stage.innerHTML = `
      <div class="welcome">
        <div class="welcome-eyebrow">⚡ Game Over</div>
        <div class="end-score-display">${score}</div>
        <div class="end-score-out-of">out of ${scenarios.length}</div>
        <div class="end-blurb">${blurb}</div>
        <div class="exit-ticket">
          <div class="exit-ticket-label">✎ Exit Ticket</div>
          <div class="exit-ticket-body">
            Pick the case where you disagreed with the 'correct' answer the most. Write 3 sentences: what you'd actually do, and why. There's no wrong answer — public health officials disagree on these too.
          </div>
        </div>
        <button class="cta-btn" id="reset-btn">Play Again ↻</button>
      </div>
    `;
    document.getElementById('reset-btn').addEventListener('click', () => {
      idx = -1; score = 0; answered = {}; votes = {}; render();
    });
  }

  voteToggleBtn.addEventListener('click', () => {
    voteMode = !voteMode;
    render();
  });

  backBtn.addEventListener('click', () => { if (idx > -1) { idx--; render(); } });
  nextBtn.addEventListener('click', () => { if (idx < scenarios.length) { idx++; render(); } });

  render();
})();
</script>

</body>
</html>
